<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Discount Calculator</title>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'km,en,zh-CN',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript"
        src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
        :root {
            --bg: #0b1020;
            --bg-soft: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #ecf2ff;
            --muted: #9fb0d0;
            --accent: #6ea8fe;
            --accent-2: #8b5cf6;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110, 168, 254, .22), transparent 28%),
                radial-gradient(circle at top right, rgba(139, 92, 246, .18), transparent 25%),
                linear-gradient(180deg, #09101d 0%, #0b1020 45%, #050814 100%);
            color: var(--text);
        }

        body {
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }

        .glow {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 999px;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .glow.one {
            top: 0;
            left: -80px;
            background: #3b82f6;
        }

        .glow.two {
            right: -80px;
            bottom: 0;
            background: #7c3aed;
        }

        .app {
            position: relative;
            z-index: 1;
            width: min(1180px, 100%);
            margin: 0 auto;
            min-height: calc(100vh - 32px);
            display: grid;
            place-items: center;
            padding: 20px 0;
        }

        .calculator-container {
            width: 100%;
            max-width: 600px;
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .03));
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px;
            margin-bottom: 20px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 999px;
            background: var(--bg-soft);
            border: 1px solid rgba(255, 255, 255, .1);
            color: var(--text);
            text-decoration: none;
            font-size: .9rem;
            margin-bottom: 24px;
            transition: all .2s ease;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, .12);
            transform: translateY(-1px);
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 2.2rem;
            text-align: center;
        }

        .subtitle {
            color: var(--muted);
            text-align: center;
            margin-bottom: 32px;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, .2);
            border-radius: 12px;
            background: rgba(255, 255, 255, .05);
            color: var(--text);
            font-size: 1rem;
            transition: border-color .2s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .calculate-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform .2s ease, box-shadow .2s ease;
            margin-bottom: 24px;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(110, 168, 254, .3);
        }

        .results {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 16px;
            padding: 24px;
            margin-top: 24px;
        }

        .results h3 {
            margin: 0 0 16px 0;
            color: var(--accent);
            font-size: 1.3rem;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .1);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: var(--muted);
            font-size: .95rem;
        }

        .result-value {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text);
        }

        .savings-highlight {
            color: #10b981;
        }

        @media (max-width: 640px) {
            .calculator-container {
                padding: 24px 20px;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="glow one"></div>
    <div class="glow two"></div>

    <main class="app">
        <div class="calculator-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <a href="index.html" class="back-button">← Back to Services</a>
                <div id="google_translate_element"></div>
            </div>

            <h1>💸 Discount Calculator</h1>
            <p class="subtitle">Calculate savings and final prices with ease</p>

            <div class="input-group">
                <label for="originalPrice">Original Price ($)</label>
                <input type="number" id="originalPrice" placeholder="Enter original price" step="0.01" min="0">
            </div>

            <div class="input-group">
                <label for="discountRate">Discount Rate (%)</label>
                <input type="number" id="discountRate" placeholder="Enter discount percentage" step="0.01" min="0"
                    max="100">
            </div>

            <button class="calculate-btn" onclick="calculateDiscount()">Calculate Discount</button>

            <div class="results" id="results" style="display: none;">
                <h3>💰 Discount Results</h3>
                <div class="result-item">
                    <span class="result-label">Original Price:</span>
                    <span class="result-value" id="originalPriceResult">$0.00</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Discount Rate:</span>
                    <span class="result-value" id="discountRateResult">0%</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Discount Amount:</span>
                    <span class="result-value" id="discountAmount">$0.00</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Final Price:</span>
                    <span class="result-value" id="finalPrice">$0.00</span>
                </div>
                <div class="result-item">
                    <span class="result-label">You Save:</span>
                    <span class="result-value savings-highlight" id="savings">$0.00</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        function calculateDiscount() {
            const originalPrice = parseFloat(document.getElementById('originalPrice').value);
            const discountRate = parseFloat(document.getElementById('discountRate').value);

            if (isNaN(originalPrice) || isNaN(discountRate) || originalPrice < 0 || discountRate < 0 || discountRate > 100) {
                alert('Please enter valid values. Original price must be positive, and discount rate must be between 0-100%.');
                return;
            }

            const discountAmount = originalPrice * (discountRate / 100);
            const finalPrice = originalPrice - discountAmount;

            document.getElementById('originalPriceResult').textContent = formatCurrency(originalPrice);
            document.getElementById('discountRateResult').textContent = discountRate + '%';
            document.getElementById('discountAmount').textContent = formatCurrency(discountAmount);
            document.getElementById('finalPrice').textContent = formatCurrency(finalPrice);
            document.getElementById('savings').textContent = formatCurrency(discountAmount);

            document.getElementById('results').style.display = 'block';
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(amount);
        }
    </script>
</body>

</html>
