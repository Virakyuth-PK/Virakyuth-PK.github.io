<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Percentage Calculator</title>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'km,en,zh-CN',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript"
        src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
        :root {
            --bg: #0b1020;
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #ecf2ff;
            --muted: #9fb0d0;
            --accent: #6ea8fe;
            --accent-2: #8b5cf6;
            --success: #34d399;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110, 168, 254, .22), transparent 28%),
                radial-gradient(circle at top right, rgba(139, 92, 246, .18), transparent 25%),
                linear-gradient(180deg, #09101d 0%, #0b1020 45%, #050814 100%);
            color: var(--text);
        }

        body {
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }

        .glow {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 999px;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .glow.one {
            top: 0;
            left: -80px;
            background: #3b82f6;
        }

        .glow.two {
            right: -80px;
            bottom: 0;
            background: #7c3aed;
        }

        .app {
            position: relative;
            z-index: 1;
            width: min(1000px, 100%);
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .03));
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            padding: 24px;
            margin-bottom: 20px;
        }

        .back-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .text-button {
            padding: 0 14px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            margin: 0 0 8px;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .calc-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            flex-wrap: wrap;
        }

        .calc-tab {
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .calc-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .calc-tab:hover {
            color: var(--text);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .form-label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-input {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .form-input::placeholder {
            color: var(--muted);
        }

        .form-group.input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .result-box {
            background: rgba(52, 211, 153, .1);
            border: 2px solid rgba(52, 211, 153, .3);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-top: 16px;
            display: none;
        }

        .result-box.show {
            display: block;
        }

        .result-label {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .result-value {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--success), #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .calc-content {
            display: none;
        }

        .calc-content.active {
            display: block;
        }

        .button-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(110, 168, 254, .3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .12);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, .1);
        }

        @media (max-width: 768px) {
            .form-group.input-group {
                grid-template-columns: 1fr;
            }

            .calc-tabs {
                flex-direction: column;
                border-bottom: none;
                border-right: 1px solid rgba(255, 255, 255, .08);
            }

            .calc-tab.active {
                border-bottom-color: transparent;
                border-right-color: var(--accent);
            }
        }
    </style>
</head>

<body>
    <div class="glow one"></div>
    <div class="glow two"></div>

    <main class="app">
        <section class="card">
            <div class="back-row">
                <a href="index.html" class="text-button">← Back to Services</a>
                <div id="google_translate_element"></div>
            </div>

            <div class="brand">
                <h1>📊 Percentage Calculator</h1>
                <p>Calculate percentages and solve percentage problems</p>
            </div>

            <div class="calc-tabs">
                <button class="calc-tab active" onclick="switchCalc('percent')">What is X% of Y</button>
                <button class="calc-tab" onclick="switchCalc('percentage')">X is what % of Y</button>
                <button class="calc-tab" onclick="switchCalc('increase')">Percentage Increase</button>
                <button class="calc-tab" onclick="switchCalc('decrease')">Percentage Decrease</button>
            </div>

            <!-- Calc 1: What is X% of Y -->
            <div id="percent" class="calc-content active">
                <div class="form-group input-group">
                    <div class="form-group">
                        <label class="form-label">Percentage (%)</label>
                        <input type="number" id="percent1" class="form-input" placeholder="25" oninput="calcPercent1()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Total</label>
                        <input type="number" id="total1" class="form-input" placeholder="200" oninput="calcPercent1()">
                    </div>
                </div>
                <div class="result-box" id="result1">
                    <div class="result-label">Result</div>
                    <div class="result-value" id="resultValue1">0</div>
                </div>
            </div>

            <!-- Calc 2: X is what % of Y -->
            <div id="percentage" class="calc-content">
                <div class="form-group input-group">
                    <div class="form-group">
                        <label class="form-label">Value</label>
                        <input type="number" id="value2" class="form-input" placeholder="50" oninput="calcPercent2()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Total</label>
                        <input type="number" id="total2" class="form-input" placeholder="200" oninput="calcPercent2()">
                    </div>
                </div>
                <div class="result-box" id="result2">
                    <div class="result-label">Percentage</div>
                    <div class="result-value" id="resultValue2">0%</div>
                </div>
            </div>

            <!-- Calc 3: Percentage Increase -->
            <div id="increase" class="calc-content">
                <div class="form-group input-group">
                    <div class="form-group">
                        <label class="form-label">Original Value</label>
                        <input type="number" id="original3" class="form-input" placeholder="100"
                            oninput="calcPercent3()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">New Value</label>
                        <input type="number" id="new3" class="form-input" placeholder="120" oninput="calcPercent3()">
                    </div>
                </div>
                <div class="result-box" id="result3">
                    <div class="result-label">Percentage Increase</div>
                    <div class="result-value" id="resultValue3">0%</div>
                </div>
            </div>

            <!-- Calc 4: Percentage Decrease -->
            <div id="decrease" class="calc-content">
                <div class="form-group input-group">
                    <div class="form-group">
                        <label class="form-label">Original Value</label>
                        <input type="number" id="original4" class="form-input" placeholder="100"
                            oninput="calcPercent4()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">New Value</label>
                        <input type="number" id="new4" class="form-input" placeholder="80" oninput="calcPercent4()">
                    </div>
                </div>
                <div class="result-box" id="result4">
                    <div class="result-label">Percentage Decrease</div>
                    <div class="result-value" id="resultValue4">0%</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        function switchCalc(type) {
            // Hide all
            document.querySelectorAll('.calc-content').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.calc-tab').forEach(el => {
                el.classList.remove('active');
            });

            // Show selected
            document.getElementById(type).classList.add('active');
            event.target.classList.add('active');
        }

        function calcPercent1() {
            const percent = parseFloat(document.getElementById('percent1').value);
            const total = parseFloat(document.getElementById('total1').value);

            if (percent && total) {
                const result = (percent / 100) * total;
                document.getElementById('result1').classList.add('show');
                document.getElementById('resultValue1').textContent = result.toFixed(2);
            } else {
                document.getElementById('result1').classList.remove('show');
            }
        }

        function calcPercent2() {
            const value = parseFloat(document.getElementById('value2').value);
            const total = parseFloat(document.getElementById('total2').value);

            if (value && total) {
                const result = (value / total) * 100;
                document.getElementById('result2').classList.add('show');
                document.getElementById('resultValue2').textContent = result.toFixed(2) + '%';
            } else {
                document.getElementById('result2').classList.remove('show');
            }
        }

        function calcPercent3() {
            const original = parseFloat(document.getElementById('original3').value);
            const newVal = parseFloat(document.getElementById('new3').value);

            if (original && newVal !== '') {
                const result = ((newVal - original) / original) * 100;
                document.getElementById('result3').classList.add('show');
                document.getElementById('resultValue3').textContent = result.toFixed(2) + '%';
            } else {
                document.getElementById('result3').classList.remove('show');
            }
        }

        function calcPercent4() {
            const original = parseFloat(document.getElementById('original4').value);
            const newVal = parseFloat(document.getElementById('new4').value);

            if (original && newVal !== '') {
                const result = ((original - newVal) / original) * 100;
                document.getElementById('result4').classList.add('show');
                document.getElementById('resultValue4').textContent = result.toFixed(2) + '%';
            } else {
                document.getElementById('result4').classList.remove('show');
            }
        }
    </script>
</body>

</html>
