        :root {
            --bg: #0b1020;
            --bg-soft: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #ecf2ff;
            --muted: #9fb0d0;
            --accent: #6ea8fe;
            --accent-2: #8b5cf6;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110, 168, 254, .22), transparent 28%),
                radial-gradient(circle at top right, rgba(139, 92, 246, .18), transparent 25%),
                linear-gradient(180deg, #09101d 0%, #0b1020 45%, #050814 100%);
            color: var(--text);
        }

        body {
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }

        .glow {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 999px;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .glow.one {
            top: 0;
            left: -80px;
            background: #3b82f6;
        }

        .glow.two {
            right: -80px;
            bottom: 0;
            background: #7c3aed;
        }

        .app {
            position: relative;
            z-index: 1;
            width: min(1180px, 100%);
            margin: 0 auto;
            min-height: calc(100vh - 32px);
            display: grid;
            place-items: center;
            padding: 20px 0;
        }

        .calculator-container {
            width: 100%;
            max-width: 600px;
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .03));
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px;
            margin-bottom: 20px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 999px;
            background: var(--bg-soft);
            border: 1px solid rgba(255, 255, 255, .1);
            color: var(--text);
            text-decoration: none;
            font-size: .9rem;
            margin-bottom: 24px;
            transition: all .2s ease;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, .12);
            transform: translateY(-1px);
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 2.2rem;
            text-align: center;
        }

        .subtitle {
            color: var(--muted);
            text-align: center;
            margin-bottom: 32px;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, .2);
            border-radius: 12px;
            background: rgba(255, 255, 255, .05);
            color: var(--text);
            font-size: 1rem;
            transition: border-color .2s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, .08);
        }

        .input-group input:hover {
            border-color: rgba(110, 168, 254, .4);
        }

        .currency-row {
            display: grid;
            grid-template-columns: 1fr 60px 1fr;
            gap: 12px;
            align-items: end;
            margin-bottom: 20px;
        }

        .currency-select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, .2);
            border-radius: 12px;
            background: rgba(255, 255, 255, .05);
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            transition: border-color .2s ease, background .2s ease;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ecf2ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6,9 12,15 18,9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px;
        }

        .currency-select:focus {
            outline: none;
            border-color: var(--accent);
            background-color: rgba(255, 255, 255, .08);
        }

        .currency-select:hover {
            border-color: rgba(110, 168, 254, .4);
        }

        .swap-btn {
            width: 100%;
            height: 48px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, .2);
            border-radius: 12px;
            background: rgba(255, 255, 255, .05);
            color: var(--text);
            cursor: pointer;
            transition: all .2s ease;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            touch-action: manipulation;
        }

        .swap-btn:hover {
            background: rgba(255, 255, 255, .1);
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .swap-btn:active {
            transform: scale(0.95);
        }

        .calculate-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform .2s ease, box-shadow .2s ease;
            margin-bottom: 24px;
            min-height: 56px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(110, 168, 254, .3);
        }

        .calculate-btn:active {
            transform: translateY(0);
            box-shadow: 0 5px 15px rgba(110, 168, 254, .2);
        }

        .results {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 16px;
            padding: 24px;
            margin-top: 24px;
        }

        .results h3 {
            margin: 0 0 16px 0;
            color: var(--accent);
            font-size: 1.3rem;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .1);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: var(--muted);
            font-size: .95rem;
        }

        .result-value {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text);
        }

        .loading {
            text-align: center;
            color: var(--muted);
            padding: 20px;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
        }

        @media (max-width: 640px) {
            .calculator-container {
                padding: 24px 20px;
            }

            .input-group input {
                font-size: 16px;
                /* Prevents zoom on iOS */
                padding: 16px 20px;
                min-height: 56px;
            }

            .currency-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .currency-select {
                font-size: 16px;
                /* Prevents zoom on iOS */
                padding: 16px 20px;
                padding-right: 50px;
                background-size: 20px;
                background-position: right 16px center;
                min-height: 56px;
            }

            .swap-btn {
                width: 100%;
                min-height: 56px;
                font-size: 1.4rem;
                padding: 16px;
            }

            .calculate-btn {
                min-height: 56px;
                font-size: 1.2rem;
                padding: 18px;
            }

            h1 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .calculator-container {
                padding: 20px 16px;
            }

            .input-group input {
                padding: 18px 22px;
                min-height: 60px;
            }

            .currency-select {
                padding: 18px 22px;
                padding-right: 55px;
                min-height: 60px;
                font-size: 16px;
            }

            .swap-btn {
                min-height: 60px;
                font-size: 1.5rem;
                padding: 18px;
            }

            .calculate-btn {
                min-height: 60px;
                font-size: 1.3rem;
                padding: 20px;
            }
        }
    </style>
</head>

    <script>
        let exchangeRates = {};
        let lastUpdated = '';

        async function convertCurrency() {
            const amount = parseFloat(document.getElementById('amount').value);
            const fromCurrency = document.getElementById('fromCurrency').value;
            const toCurrency = document.getElementById('toCurrency').value;

            if (isNaN(amount) || amount < 0) {
                alert('Please enter a valid amount.');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('results').style.display = 'none';

            try {
                // Using open.er-api.com (free API with CORS support)
                const response = await fetch(`https://open.er-api.com/v6/latest/USD`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.result === 'success') {
                    exchangeRates = data.rates;
                    lastUpdated = new Date().toLocaleString();

                    // Calculate rates relative to USD base
                    const usdToFromRate = data.rates[fromCurrency];
                    const usdToToRate = data.rates[toCurrency];

                    if (!usdToFromRate || !usdToToRate) {
                        throw new Error(`Currency ${!usdToFromRate ? fromCurrency : toCurrency} not supported`);
                    }

                    // Convert: amount in fromCurrency -> USD -> toCurrency
                    const amountInUSD = amount / usdToFromRate;
                    const convertedAmount = amountInUSD * usdToToRate;

                    // Calculate direct exchange rate
                    const directRate = usdToToRate / usdToFromRate;

                    document.getElementById('fromResult').textContent = formatCurrency(amount, fromCurrency);
                    document.getElementById('toResult').textContent = formatCurrency(convertedAmount, toCurrency);
                    document.getElementById('rateResult').textContent = `1 ${fromCurrency} = ${directRate.toFixed(4)} ${toCurrency}`;
                    document.getElementById('lastUpdated').textContent = lastUpdated;

                    document.getElementById('results').style.display = 'block';
                } else {
                    throw new Error(`API Error: ${data.error || 'Unknown error'}`);
                }
            } catch (error) {
                console.error('Error fetching exchange rates:', error);
                document.getElementById('error').textContent = `Unable to fetch exchange rates: ${error.message}`;
                document.getElementById('error').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
