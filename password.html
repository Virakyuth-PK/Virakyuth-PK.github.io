<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Password Generator</title>
    <style>
        :root {
            --bg: #0b1020;
            --bg-soft: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #ecf2ff;
            --muted: #9fb0d0;
            --accent: #6ea8fe;
            --accent-2: #8b5cf6;
            --success: #34d399;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110, 168, 254, .22), transparent 28%),
                radial-gradient(circle at top right, rgba(139, 92, 246, .18), transparent 25%),
                linear-gradient(180deg, #09101d 0%, #0b1020 45%, #050814 100%);
            color: var(--text);
        }

        body {
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }

        .glow {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 999px;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .glow.one {
            top: 0;
            left: -80px;
            background: #3b82f6;
        }

        .glow.two {
            right: -80px;
            bottom: 0;
            background: #7c3aed;
        }

        .app {
            position: relative;
            z-index: 1;
            width: min(1000px, 100%);
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .03));
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 24px;
            margin-bottom: 20px;
        }

        .back-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .text-button {
            min-height: 44px;
            padding: 0 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            margin: 0 0 8px;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-input,
        .form-select {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-input:focus,
        .form-select:focus {
            border-color: var(--accent);
        }

        .form-input::placeholder {
            color: var(--muted);
        }

        .checkbox-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
        }

        .generate-btn,
        .copy-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .generate-btn:hover,
        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(110, 168, 254, .3);
        }

        .password-output {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .08);
            color: var(--text);
            font-size: 1rem;
            overflow-wrap: anywhere;
            min-height: 54px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {

            .form-grid,
            .checkbox-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="glow one"></div>
    <div class="glow two"></div>

    <main class="app">
        <section class="card">
            <div class="back-row">
                <a href="index.html" class="text-button">← Back to Services</a>
            </div>

            <div class="brand">
                <h1>🔐 Password Generator</h1>
                <p>Generate strong passwords with length and character options, then copy them instantly.</p>
                <p style="font-size: 0.9rem; margin-top: 8px; opacity: 0.8;">Choose the types of characters you need and
                    get a secure result.</p>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="passwordLength">Password Length</label>
                    <input id="passwordLength" class="form-input" type="number" min="6" max="64" value="16">
                </div>
                <div class="form-group">
                    <label class="form-label" for="passwordCount">Number of Passwords</label>
                    <input id="passwordCount" class="form-input" type="number" min="1" max="5" value="1">
                </div>
            </div>

            <div class="checkbox-row">
                <label class="checkbox-group"><input id="includeLower" type="checkbox" checked> Lowercase</label>
                <label class="checkbox-group"><input id="includeUpper" type="checkbox" checked> Uppercase</label>
                <label class="checkbox-group"><input id="includeNumbers" type="checkbox" checked> Numbers</label>
                <label class="checkbox-group"><input id="includeSymbols" type="checkbox"> Symbols</label>
            </div>

            <button id="generateBtn" type="button" class="generate-btn">Generate Password</button>

            <div class="form-group" style="margin-top: 20px;">
                <label class="form-label" for="passwordOutput">Generated Password</label>
                <div id="passwordOutput" class="password-output"></div>
            </div>

            <button id="copyBtn" type="button" class="copy-btn hidden">Copy Password</button>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const lengthInput = document.getElementById('passwordLength');
            const countInput = document.getElementById('passwordCount');
            const includeLower = document.getElementById('includeLower');
            const includeUpper = document.getElementById('includeUpper');
            const includeNumbers = document.getElementById('includeNumbers');
            const includeSymbols = document.getElementById('includeSymbols');
            const output = document.getElementById('passwordOutput');
            const generateBtn = document.getElementById('generateBtn');
            const copyBtn = document.getElementById('copyBtn');

            function generatePassword(length, charset) {
                let password = '';
                for (let i = 0; i < length; i++) {
                    password += charset.charAt(Math.floor(Math.random() * charset.length));
                }
                return password;
            }

            generateBtn.addEventListener('click', function () {
                const length = Math.max(6, Math.min(64, parseInt(lengthInput.value, 10) || 16));
                const count = Math.max(1, Math.min(5, parseInt(countInput.value, 10) || 1));
                let charset = '';
                if (includeLower.checked) charset += 'abcdefghijklmnopqrstuvwxyz';
                if (includeUpper.checked) charset += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                if (includeNumbers.checked) charset += '0123456789';
                if (includeSymbols.checked) charset += '!@#$%^&*()-_=+[]{}|;:,.<>?';

                if (!charset) {
                    alert('Select at least one character type.');
                    return;
                }

                const passwords = [];
                for (let i = 0; i < count; i++) {
                    passwords.push(generatePassword(length, charset));
                }

                output.textContent = passwords.join('\n');
                copyBtn.classList.remove('hidden');
            });

            copyBtn.addEventListener('click', function () {
                const text = output.textContent;
                navigator.clipboard.writeText(text).then(() => {
                    copyBtn.textContent = 'Copied!';
                    setTimeout(() => {
                        copyBtn.textContent = 'Copy Password';
                    }, 1500);
                });
            });
        });
    </script>
</body>

</html>
