<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tip Calculator</title>
    <style>
        :root {
            --bg: #0b1020;
            --bg-soft: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #ecf2ff;
            --muted: #9fb0d0;
            --accent: #6ea8fe;
            --accent-2: #8b5cf6;
            --success: #34d399;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110, 168, 254, .22), transparent 28%),
                radial-gradient(circle at top right, rgba(139, 92, 246, .18), transparent 25%),
                linear-gradient(180deg, #09101d 0%, #0b1020 45%, #050814 100%);
            color: var(--text);
        }

        body {
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }

        .glow {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 999px;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .glow.one {
            top: 0;
            left: -80px;
            background: #3b82f6;
        }

        .glow.two {
            right: -80px;
            bottom: 0;
            background: #7c3aed;
        }

        .app {
            position: relative;
            z-index: 1;
            width: min(1000px, 100%);
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .03));
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 24px;
            margin-bottom: 20px;
        }

        .back-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .text-button {
            min-height: 44px;
            padding: 0 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            margin: 0 0 8px;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-input,
        .form-select {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-input:focus,
        .form-select:focus {
            border-color: var(--accent);
        }

        .form-input::placeholder {
            color: var(--muted);
        }

        .calculate-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 24px;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(110, 168, 254, .3);
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .result-card {
            background: rgba(0, 0, 0, .2);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .result-card.summary {
            background: linear-gradient(135deg, var(--success), rgba(52, 211, 153, 0.1));
            border-color: var(--success);
        }

        .result-value {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .result-label {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {

            .form-grid,
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="glow one"></div>
    <div class="glow two"></div>

    <main class="app">
        <section class="card">
            <div class="back-row">
                <a href="index.html" class="text-button">← Back to Services</a>
            </div>

            <div class="brand">
                <h1>🧮 Tip Calculator</h1>
                <p>Quickly calculate tips, totals, and per-person shares for restaurant bills.</p>
                <p style="font-size: 0.9rem; margin-top: 8px; opacity: 0.8;">Adjust the tip percentage, split the bill,
                    and get results instantly.</p>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="billAmount">Bill Amount</label>
                    <input id="billAmount" class="form-input" type="number" placeholder="Enter bill total" min="0"
                        step="0.01" value="100.00">
                </div>
                <div class="form-group">
                    <label class="form-label" for="tipPercent">Tip Percentage</label>
                    <input id="tipPercent" class="form-input" type="number" placeholder="15" min="0" step="1"
                        value="15">
                </div>
                <div class="form-group">
                    <label class="form-label" for="peopleCount">Number of People</label>
                    <input id="peopleCount" class="form-input" type="number" placeholder="1" min="1" step="1" value="1">
                </div>
                <div class="form-group">
                    <label class="form-label" for="roundUp">Round Up?</label>
                    <select id="roundUp" class="form-select">
                        <option value="none">No rounding</option>
                        <option value="tip">Round tip up</option>
                        <option value="total">Round total up</option>
                    </select>
                </div>
            </div>

            <button id="calculateBtn" type="button" class="calculate-btn">Calculate Tip</button>

            <div id="results" class="results-grid hidden">
                <div class="result-card summary">
                    <div class="result-value" id="totalTip">$0.00</div>
                    <div class="result-label">Total Tip</div>
                </div>
                <div class="result-card summary">
                    <div class="result-value" id="totalAmount">$0.00</div>
                    <div class="result-label">Total Amount</div>
                </div>
                <div class="result-card">
                    <div class="result-value" id="eachPerson">$0.00</div>
                    <div class="result-label">Per Person</div>
                </div>
                <div class="result-card">
                    <div class="result-value" id="tipEach">$0.00</div>
                    <div class="result-label">Tip Per Person</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const billAmount = document.getElementById('billAmount');
            const tipPercent = document.getElementById('tipPercent');
            const peopleCount = document.getElementById('peopleCount');
            const roundUp = document.getElementById('roundUp');
            const calculateBtn = document.getElementById('calculateBtn');
            const results = document.getElementById('results');
            const totalTip = document.getElementById('totalTip');
            const totalAmount = document.getElementById('totalAmount');
            const eachPerson = document.getElementById('eachPerson');
            const tipEach = document.getElementById('tipEach');

            calculateBtn.addEventListener('click', calculateTip);

            function calculateTip() {
                const bill = parseFloat(billAmount.value) || 0;
                const tipRate = parseFloat(tipPercent.value) || 0;
                const people = Math.max(1, parseInt(peopleCount.value, 10) || 1);
                let tip = bill * (tipRate / 100);
                let total = bill + tip;

                if (roundUp.value === 'tip') {
                    tip = Math.ceil(tip * 100) / 100;
                    total = bill + tip;
                } else if (roundUp.value === 'total') {
                    total = Math.ceil(total * 100) / 100;
                    tip = total - bill;
                }

                totalTip.textContent = `$${tip.toFixed(2)}`;
                totalAmount.textContent = `$${total.toFixed(2)}`;
                eachPerson.textContent = `$${(total / people).toFixed(2)}`;
                tipEach.textContent = `$${(tip / people).toFixed(2)}`;
                results.classList.remove('hidden');
                results.scrollIntoView({ behavior: 'smooth' });
            }
        });
    </script>
</body>

</html>
