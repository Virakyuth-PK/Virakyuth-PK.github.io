<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Text Statistics</title>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'km,en,zh-CN',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript"
        src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
        :root {
            --bg: #0b1020;
            --bg-soft: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #ecf2ff;
            --muted: #9fb0d0;
            --accent: #6ea8fe;
            --accent-2: #8b5cf6;
            --success: #34d399;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110, 168, 254, .22), transparent 28%),
                radial-gradient(circle at top right, rgba(139, 92, 246, .18), transparent 25%),
                linear-gradient(180deg, #09101d 0%, #0b1020 45%, #050814 100%);
            color: var(--text);
        }

        body {
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }

        .glow {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 999px;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .glow.one {
            top: 0;
            left: -80px;
            background: #3b82f6;
        }

        .glow.two {
            right: -80px;
            bottom: 0;
            background: #7c3aed;
        }

        .app {
            position: relative;
            z-index: 1;
            width: min(1000px, 100%);
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .03));
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            padding: 24px;
            margin-bottom: 20px;
        }

        .back-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .text-button {
            padding: 0 14px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            margin: 0 0 8px;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .form-label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-textarea {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            min-height: 200px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-textarea:focus {
            border-color: var(--accent);
        }

        .form-textarea::placeholder {
            color: var(--muted);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 8px;
        }

        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(110, 168, 254, .3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .12);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, .1);
        }

        @media (max-width: 640px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="glow one"></div>
    <div class="glow two"></div>

    <main class="app">
        <section class="card">
            <div class="back-row">
                <a href="index.html" class="text-button">← Back to Services</a>
                <div id="google_translate_element"></div>
            </div>

            <div class="brand">
                <h1>📝 Text Statistics</h1>
                <p>Analyze your text with detailed statistics</p>
            </div>

            <div class="form-group">
                <label class="form-label">Paste your text here</label>
                <textarea id="textInput" class="form-textarea"
                    placeholder="Enter or paste any text to analyze..."></textarea>
            </div>

            <div class="button-row">
                <button class="btn btn-primary" onclick="analyzeText()">Analyze Text</button>
                <button class="btn btn-secondary" onclick="clearText()">Clear</button>
                <button class="btn btn-secondary" onclick="copyStats()">Copy Stats</button>
            </div>

            <div id="statsContainer" style="display: none; margin-top: 24px;">
                <h3 style="margin: 0 0 16px; color: var(--text);">Statistics</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="charCount">0</div>
                        <div class="stat-label">Characters</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="charNoSpace">0</div>
                        <div class="stat-label">Chars (no space)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="wordCount">0</div>
                        <div class="stat-label">Words</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="lineCount">0</div>
                        <div class="stat-label">Lines</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="sentenceCount">0</div>
                        <div class="stat-label">Sentences</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="paragraphCount">0</div>
                        <div class="stat-label">Paragraphs</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="readingTime">0</div>
                        <div class="stat-label">Min Read</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="avgWordLen">0</div>
                        <div class="stat-label">Avg Word Length</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        function analyzeText() {
            const text = document.getElementById('textInput').value;

            if (!text.trim()) {
                alert('Please enter some text to analyze');
                return;
            }

            // Character count
            const charCount = text.length;
            const charNoSpace = text.replace(/\s/g, '').length;

            // Word count
            const words = text.trim().split(/\s+/).filter(w => w.length > 0);
            const wordCount = words.length;

            // Line count
            const lines = text.split('\n');
            const lineCount = lines.length;

            // Sentence count
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
            const sentenceCount = sentences.length;

            // Paragraph count
            const paragraphs = text.split(/\n\n+/).filter(p => p.trim().length > 0);
            const paragraphCount = paragraphs.length;

            // Reading time (avg 200 words per minute)
            const readingTime = Math.ceil(wordCount / 200);

            // Average word length
            const totalLetters = words.reduce((sum, w) => sum + w.length, 0);
            const avgWordLen = (totalLetters / wordCount).toFixed(2);

            document.getElementById('charCount').textContent = charCount;
            document.getElementById('charNoSpace').textContent = charNoSpace;
            document.getElementById('wordCount').textContent = wordCount;
            document.getElementById('lineCount').textContent = lineCount;
            document.getElementById('sentenceCount').textContent = sentenceCount;
            document.getElementById('paragraphCount').textContent = paragraphCount;
            document.getElementById('readingTime').textContent = readingTime;
            document.getElementById('avgWordLen').textContent = avgWordLen;

            document.getElementById('statsContainer').style.display = 'block';
            document.getElementById('statsContainer').scrollIntoView({ behavior: 'smooth' });
        }

        function clearText() {
            document.getElementById('textInput').value = '';
            document.getElementById('statsContainer').style.display = 'none';
        }

        function copyStats() {
            const stats = `Characters: ${document.getElementById('charCount').textContent}
Characters (no space): ${document.getElementById('charNoSpace').textContent}
Words: ${document.getElementById('wordCount').textContent}
Lines: ${document.getElementById('lineCount').textContent}
Sentences: ${document.getElementById('sentenceCount').textContent}
Paragraphs: ${document.getElementById('paragraphCount').textContent}
Reading Time: ${document.getElementById('readingTime').textContent} min
Average Word Length: ${document.getElementById('avgWordLen').textContent}`;

            navigator.clipboard.writeText(stats).then(() => {
                alert('Stats copied to clipboard!');
            });
        }

        // Real-time analysis as you type
        document.getElementById('textInput').addEventListener('input', function () {
            if (this.value.trim().length > 0) {
                analyzeText();
            }
        });
    </script>
</body>

</html>
