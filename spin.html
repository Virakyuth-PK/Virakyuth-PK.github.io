<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Spin Wheel Selector</title>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'km,en,zh-CN',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript"
        src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
        :root {
            --bg: #0b1020;
            --bg-soft: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #ecf2ff;
            --muted: #9fb0d0;
            --accent: #6ea8fe;
            --accent-2: #8b5cf6;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #fb7185;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110, 168, 254, .22), transparent 28%),
                radial-gradient(circle at top right, rgba(139, 92, 246, .18), transparent 25%),
                linear-gradient(180deg, #09101d 0%, #0b1020 45%, #050814 100%);
            color: var(--text);
        }

        body {
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }

        .glow {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 999px;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .glow.one {
            top: 0;
            left: -80px;
            background: #3b82f6;
        }

        .glow.two {
            right: -80px;
            bottom: 0;
            background: #7c3aed;
        }

        .app {
            position: relative;
            z-index: 1;
            width: min(1000px, 100%);
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .03));
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 24px;
            margin-bottom: 20px;
        }

        .back-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .text-button {
            min-height: 44px;
            padding: 0 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            margin: 0 0 8px;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-input,
        .form-select,
        .form-textarea {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            border-color: var(--accent);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--muted);
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .generate-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 24px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(110, 168, 254, .3);
        }

        .generate-btn:disabled {
            background: rgba(255, 255, 255, .12);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .wheel-result {
            text-align: center;
            background: rgba(0, 0, 0, .2);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .wheel-result::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(110, 168, 254, 0.1) 50%, transparent 70%);
            animation: shimmer 3s infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 30px;
            filter: drop-shadow(0 0 30px rgba(110, 168, 254, 0.3));
        }

        .wheel-container::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, rgba(110, 168, 254, 0.2), transparent);
            animation: rotate 8s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .wheel {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.5));
        }

        .wheel.spinning {
            animation: spinPulse 4s ease-out;
        }

        @keyframes spinPulse {
            0% {
                filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.5)) brightness(1);
            }

            50% {
                filter: drop-shadow(0 0 40px rgba(110, 168, 254, 0.6)) brightness(1.2);
            }

            100% {
                filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.5)) brightness(1);
            }
        }
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 40px solid var(--accent);
            z-index: 10;
            filter: drop-shadow(0 0 15px rgba(110, 168, 254, 0.9));
            animation: pointerGlow 1.5s ease-in-out infinite alternate;
        }

        .pointer::before {
            content: '🎯';
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            animation: pointerPulse 1.5s ease-in-out infinite alternate;
        }

        .pointer::after {
            content: 'WINNER';
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 0 0 5px rgba(110, 168, 254, 0.8);
            letter-spacing: 1px;
        }

        @keyframes pointerGlow {
            0% {
                filter: drop-shadow(0 0 15px rgba(110, 168, 254, 0.9));
                border-bottom-color: var(--accent);
            }

            100% {
                filter: drop-shadow(0 0 25px rgba(110, 168, 254, 1));
                border-bottom-color: #ffffff;
            }
        }

        @keyframes pointerPulse {
            0% {
                transform: translateX(-50%) scale(1);
                text-shadow: 0 0 5px rgba(110, 168, 254, 0.8);
            }

            100% {
                transform: translateX(-50%) scale(1.1);
                text-shadow: 0 0 15px rgba(110, 168, 254, 1);
            }
        }

        @keyframes pointerWin {
            0% {
                filter: drop-shadow(0 0 15px rgba(110, 168, 254, 0.9));
                transform: scaleY(1);
            }

            50% {
                filter: drop-shadow(0 0 40px rgba(255, 215, 0, 1));
                transform: scaleY(1.3);
            }

            100% {
                filter: drop-shadow(0 0 25px rgba(110, 168, 254, 1));
                transform: scaleY(1);
            }
        }

        .result-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--success);
            margin-top: 20px;
            text-shadow: 0 0 20px rgba(52, 211, 153, 0.5);
            animation: resultGlow 0.5s ease-out;
            position: relative;
        }

        @keyframes resultGlow {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(1.1);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            animation: confettiFall 3s ease-out forwards;
        }

        .confetti:nth-child(odd) {
            background: var(--accent-2);
            animation-delay: 0.1s;
        }

        .confetti:nth-child(3n) {
            background: var(--success);
            animation-delay: 0.2s;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(-20px) translateX(0) rotate(0deg);
            }

            100% {
                opacity: 0;
                transform: translateY(100vh) translateX(var(--random-x, 0)) rotate(720deg);
            }
        }

        .spin-btn {
            position: relative;
            overflow: hidden;
        }

        .spin-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .spin-btn:active::before {
            width: 300px;
            height: 300px;
        }

        @media (max-width: 768px) {
            .wheel-container {
                width: 280px;
                height: 280px;
            }

            .result-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="glow one"></div>
    <div class="glow two"></div>

    <main class="app">
        <section class="card">
            <div class="back-row">
                <a href="index.html" class="text-button">← Back to Services</a>
                <div id="google_translate_element"></div>
            </div>

            <div class="brand">
                <h1>🎡 Spin Wheel Selector</h1>
                <p>Enter your items and spin the wheel to make a random selection</p>
                <p style="font-size: 0.9rem; margin-top: 8px; opacity: 0.8;">Add your choices below and let chance
                    decide for you</p>
            </div>

            <div class="form-grid">
                <div class="form-group full-width">
                    <label class="form-label">Items to Choose From</label>
                    <textarea id="items" class="form-textarea" placeholder="Enter each item on a new line

Example:
Pizza
Burger
Salad
Sushi
Pasta">Pizza
Burger
Salad
Sushi
Pasta</textarea>
                </div>
            </div>

            <button class="generate-btn" onclick="updateWheel()">Update Wheel</button>

            <div class="wheel-result">
                <div class="wheel-container">
                    <div class="pointer"></div>
                    <svg class="wheel" id="wheel" viewBox="0 0 300 300">
                        <!-- Segments will be added here -->
                    </svg>
                </div>
                <button class="generate-btn" id="spinBtn" onclick="spinWheel()" style="margin-bottom: 0;">Spin the
                    Wheel!</button>
                <div class="result-text" id="result"></div>
            </div>
        </section>
    </main>

    <script>
        let items = [];
        let currentRotation = 0;

        function updateWheel() {
            const textarea = document.getElementById('items');
            const wheel = document.getElementById('wheel');
            const spinBtn = document.getElementById('spinBtn');

            items = textarea.value.split('\n').map(item => item.trim()).filter(item => item.length > 0);

            if (items.length === 0) {
                alert('Please enter at least one item.');
                spinBtn.disabled = true;
                return;
            }

            spinBtn.disabled = false;

            // Clear existing segments
            while (wheel.firstChild) {
                wheel.removeChild(wheel.firstChild);
            }

            const numItems = items.length;
            const anglePerSegment = 360 / numItems;
            const radius = 150;
            const centerX = 150;
            const centerY = 150;

            items.forEach((item, index) => {
                const startAngle = (index * anglePerSegment) * (Math.PI / 180);
                const endAngle = ((index + 1) * anglePerSegment) * (Math.PI / 180);

                const x1 = centerX + radius * Math.cos(startAngle);
                const y1 = centerY + radius * Math.sin(startAngle);
                const x2 = centerX + radius * Math.cos(endAngle);
                const y2 = centerY + radius * Math.sin(endAngle);

                const largeArcFlag = anglePerSegment > 180 ? 1 : 0;

                const pathData = [
                    `M ${centerX} ${centerY}`,
                    `L ${x1} ${y1}`,
                    `A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2}`,
                    'Z'
                ].join(' ');

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathData);
                // Create more vibrant colors with gradients
                const hue = (index * (360 / numItems) + 30) % 360;
                path.setAttribute('fill', `hsl(${hue}, 85%, 55%)`);
                path.setAttribute('stroke', `hsl(${hue}, 90%, 70%)`);
                path.setAttribute('stroke-width', '2');

                // Add gradient effect
                const gradientId = `gradient${index}`;
                const gradient = document.createElementNS('http://www.w3.org/2000/svg', 'radialGradient');
                gradient.setAttribute('id', gradientId);
                gradient.setAttribute('cx', '50%');
                gradient.setAttribute('cy', '30%');
                gradient.setAttribute('r', '70%');

                const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                stop1.setAttribute('offset', '0%');
                stop1.setAttribute('stop-color', `hsl(${hue}, 90%, 70%)`);
                const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                stop2.setAttribute('offset', '100%');
                stop2.setAttribute('stop-color', `hsl(${hue}, 85%, 45%)`);

                gradient.appendChild(stop1);
                gradient.appendChild(stop2);
                wheel.appendChild(gradient);

                path.setAttribute('fill', `url(#${gradientId})`);

                const textAngle = startAngle + (endAngle - startAngle) / 2;
                const textX = centerX + (radius * 0.7) * Math.cos(textAngle);
                const textY = centerY + (radius * 0.7) * Math.sin(textAngle);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', textX);
                text.setAttribute('y', textY);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                text.setAttribute('fill', 'white');
                text.setAttribute('font-size', '12');
                text.setAttribute('font-weight', 'bold');
                text.textContent = item.length > 10 ? item.substring(0, 10) + '...' : item;

                wheel.appendChild(path);
                wheel.appendChild(text);
            });

            // Add center circle for premium look
            const centerCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            centerCircle.setAttribute('cx', '150');
            centerCircle.setAttribute('cy', '150');
            centerCircle.setAttribute('r', '25');
            centerCircle.setAttribute('fill', 'rgba(255, 255, 255, 0.1)');
            centerCircle.setAttribute('stroke', 'rgba(255, 255, 255, 0.3)');
            centerCircle.setAttribute('stroke-width', '2');
            wheel.appendChild(centerCircle);

            // Add center text
            const centerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            centerText.setAttribute('x', '150');
            centerText.setAttribute('y', '155');
            centerText.setAttribute('text-anchor', 'middle');
            centerText.setAttribute('fill', 'white');
            centerText.setAttribute('font-size', '12');
            centerText.setAttribute('font-weight', 'bold');
            centerText.textContent = 'SPIN';
            wheel.appendChild(centerText);
        }

        function spinWheel() {
            if (items.length === 0) return;

            const spinBtn = document.getElementById('spinBtn');
            const result = document.getElementById('result');
            const wheel = document.getElementById('wheel');

            spinBtn.disabled = true;
            result.textContent = '';

            // Add spinning class for animation
            wheel.classList.add('spinning');

            // Random spin: multiple full rotations + random angle
            const spins = Math.random() * 8 + 8; // 8-16 full spins for more excitement
            const randomAngle = Math.random() * 360;
            const totalRotation = spins * 360 + randomAngle;

            // Calculate start and end rotation
            const startRotation = currentRotation;
            const endRotation = startRotation + totalRotation;
            currentRotation = endRotation;

            // Animate the wheel using JavaScript
            const startTime = Date.now();
            const duration = 4000; // 4 seconds

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // Use easing function for smooth animation
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const currentAngle = startRotation + (totalRotation * easeOut);

                // Add subtle vibration effect during spinning
                const vibration = Math.sin(elapsed * 0.05) * 0.5; // Small vibration

                wheel.style.transform = `rotate(${currentAngle}deg) translateX(${vibration}px)`;

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // Animation complete - remove vibration
                    wheel.classList.remove('spinning');
                    wheel.style.transform = `rotate(${currentRotation}deg)`;
                }
            }

            requestAnimationFrame(animate);

            // After animation, determine winner and add effects
            setTimeout(() => {
                // Pointer is at top (270 degrees in SVG coordinates: 0=right, 90=down, 180=left, 270=up)
                const rotation = currentRotation % 360;
                const pointerAngle = 270; // top position
                const normalizedAngle = (pointerAngle - rotation + 360) % 360;
                const segmentAngle = 360 / items.length;
                const winningIndex = Math.floor(normalizedAngle / segmentAngle);
                const winner = items[winningIndex];

                result.textContent = `🎉 ${winner} 🎉`;

                // Add confetti effect
                createConfetti();

                // Add winner highlight animation
                result.style.animation = 'none';
                setTimeout(() => {
                    result.style.animation = 'resultGlow 0.5s ease-out';
                }, 10);

                // Highlight the winning pointer
                const pointer = document.querySelector('.pointer');
                pointer.style.animation = 'none';
                setTimeout(() => {
                    pointer.style.animation = 'pointerGlow 1.5s ease-in-out infinite alternate, pointerWin 0.8s ease-out';
                }, 10);

                spinBtn.disabled = false;
            }, 4000); // Increased to 4 seconds to match new transition duration
        }

        function createConfetti() {
            const wheelResult = document.querySelector('.wheel-result');
            const confettiCount = 50;

            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.setProperty('--random-x', (Math.random() - 0.5) * 200 + 'px');
                wheelResult.appendChild(confetti);

                // Remove confetti after animation
                setTimeout(() => {
                    if (confetti.parentNode) {
                        confetti.parentNode.removeChild(confetti);
                    }
                }, 3000);
            }
        }

        // Initialize with sample items
        updateWheel();
    </script>
</body>

</html>
