<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Age Calculator</title>
    <style>
        :root {
            --bg: #0b1020;
            --bg-soft: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #ecf2ff;
            --muted: #9fb0d0;
            --accent: #6ea8fe;
            --accent-2: #8b5cf6;
            --success: #34d399;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110, 168, 254, .22), transparent 28%),
                radial-gradient(circle at top right, rgba(139, 92, 246, .18), transparent 25%),
                linear-gradient(180deg, #09101d 0%, #0b1020 45%, #050814 100%);
            color: var(--text);
        }

        body {
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }

        .glow {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 999px;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .glow.one {
            top: 0;
            left: -80px;
            background: #3b82f6;
        }

        .glow.two {
            right: -80px;
            bottom: 0;
            background: #7c3aed;
        }

        .app {
            position: relative;
            z-index: 1;
            width: min(1000px, 100%);
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .03));
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 24px;
            margin-bottom: 20px;
        }

        .back-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .text-button {
            min-height: 44px;
            padding: 0 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            margin: 0 0 8px;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-input {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .form-input::placeholder {
            color: var(--muted);
        }

        .calculate-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 24px;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(110, 168, 254, .3);
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .result-card {
            background: rgba(0, 0, 0, .2);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .result-label {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .result-note {
            color: var(--accent);
            font-weight: 700;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {

            .form-grid,
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="glow one"></div>
    <div class="glow two"></div>

    <main class="app">
        <section class="card">
            <div class="back-row">
                <a href="index.html" class="text-button">← Back to Services</a>
            </div>

            <div class="brand">
                <h1>🎂 Age Calculator</h1>
                <p>Calculate your age in years, months, and days from a birthdate.</p>
                <p style="font-size: 0.9rem; margin-top: 8px; opacity: 0.8;">Choose your birth date and get an instant
                    age summary.</p>
            </div>

            <div class="form-grid">
                <div class="form-group full-width">
                    <label class="form-label" for="birthDate">Birth Date</label>
                    <input id="birthDate" class="form-input" type="date">
                </div>
                <div class="form-group full-width">
                    <label class="form-label" for="targetDate">Compare To</label>
                    <input id="targetDate" class="form-input" type="date">
                </div>
            </div>

            <button id="calculateBtn" type="button" class="calculate-btn">Calculate Age</button>

            <div id="results" class="results-grid hidden">
                <div class="result-card">
                    <div class="result-value" id="ageYears">0</div>
                    <div class="result-label">Years</div>
                </div>
                <div class="result-card">
                    <div class="result-value" id="ageMonths">0</div>
                    <div class="result-label">Months</div>
                </div>
                <div class="result-card">
                    <div class="result-value" id="ageDays">0</div>
                    <div class="result-label">Days</div>
                </div>
                <div class="result-card">
                    <div class="result-value result-note" id="ageSummary">—</div>
                    <div class="result-label">Summary</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const birthDateInput = document.getElementById('birthDate');
            const targetDateInput = document.getElementById('targetDate');
            const calculateBtn = document.getElementById('calculateBtn');
            const results = document.getElementById('results');
            const ageYears = document.getElementById('ageYears');
            const ageMonths = document.getElementById('ageMonths');
            const ageDays = document.getElementById('ageDays');
            const ageSummary = document.getElementById('ageSummary');

            const today = new Date().toISOString().split('T')[0];
            targetDateInput.value = today;

            calculateBtn.addEventListener('click', function () {
                const birthDate = new Date(birthDateInput.value);
                const targetDate = new Date(targetDateInput.value);

                if (!birthDateInput.value) {
                    alert('Please select a birth date.');
                    return;
                }
                if (birthDate > targetDate) {
                    alert('Birth date cannot be after the compare date.');
                    return;
                }

                let years = targetDate.getFullYear() - birthDate.getFullYear();
                let months = targetDate.getMonth() - birthDate.getMonth();
                let days = targetDate.getDate() - birthDate.getDate();

                if (days < 0) {
                    months -= 1;
                    const prevMonth = new Date(targetDate.getFullYear(), targetDate.getMonth(), 0);
                    days += prevMonth.getDate();
                }
                if (months < 0) {
                    years -= 1;
                    months += 12;
                }

                ageYears.textContent = years;
                ageMonths.textContent = months;
                ageDays.textContent = days;
                ageSummary.textContent = `${years} years, ${months} months`;
                results.classList.remove('hidden');
                results.scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>
</body>

</html>
