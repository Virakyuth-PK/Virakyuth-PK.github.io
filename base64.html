<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Base64 Encoder/Decoder</title>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'km,en,zh-CN',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript"
        src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
        :root {
            --bg: #0b1020;
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #ecf2ff;
            --muted: #9fb0d0;
            --accent: #6ea8fe;
            --accent-2: #8b5cf6;
            --danger: #fb7185;
            --success: #34d399;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110, 168, 254, .22), transparent 28%),
                radial-gradient(circle at top right, rgba(139, 92, 246, .18), transparent 25%),
                linear-gradient(180deg, #09101d 0%, #0b1020 45%, #050814 100%);
            color: var(--text);
        }

        body {
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }

        .glow {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 999px;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .glow.one {
            top: 0;
            left: -80px;
            background: #3b82f6;
        }

        .glow.two {
            right: -80px;
            bottom: 0;
            background: #7c3aed;
        }

        .app {
            position: relative;
            z-index: 1;
            width: min(1000px, 100%);
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .03));
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            padding: 24px;
            margin-bottom: 20px;
        }

        .back-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .text-button {
            padding: 0 14px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            margin: 0 0 8px;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-textarea {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            resize: vertical;
            min-height: 200px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-textarea:focus {
            border-color: var(--accent);
        }

        .form-textarea::placeholder {
            color: var(--muted);
        }

        .button-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(110, 168, 254, .3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .12);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, .1);
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
        }

        .message.success {
            background: rgba(52, 211, 153, .1);
            border: 1px solid rgba(52, 211, 153, .3);
            color: var(--success);
        }

        .message.error {
            background: rgba(251, 113, 133, .1);
            border: 1px solid rgba(251, 113, 133, .3);
            color: var(--danger);
        }

        @media (max-width: 768px) {
            .input-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="glow one"></div>
    <div class="glow two"></div>

    <main class="app">
        <section class="card">
            <div class="back-row">
                <a href="index.html" class="text-button">← Back to Services</a>
                <div id="google_translate_element"></div>
            </div>

            <div class="brand">
                <h1>🔤 Base64 Encoder/Decoder</h1>
                <p>Encode text to Base64 or decode Base64 strings</p>
            </div>

            <div id="message" class="message"></div>

            <div class="input-row">
                <div class="form-group">
                    <label class="form-label">Input</label>
                    <textarea id="input" class="form-textarea" placeholder="Enter text or Base64 string"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Output</label>
                    <textarea id="output" class="form-textarea" readonly></textarea>
                </div>
            </div>

            <div class="button-row">
                <button class="btn btn-primary" onclick="encodeBase64()">Encode to Base64</button>
                <button class="btn btn-primary" onclick="decodeBase64()">Decode from Base64</button>
                <button class="btn btn-secondary" onclick="copyOutput()">Copy Output</button>
                <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
                <button class="btn btn-secondary" onclick="swapInputOutput()">Swap</button>
            </div>
        </section>
    </main>

    <script>
        function showMessage(msg, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = msg;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 3000);
        }

        function encodeBase64() {
            const input = document.getElementById('input').value;

            if (!input) {
                showMessage('Please enter text to encode', 'error');
                return;
            }

            try {
                const encoded = btoa(unescape(encodeURIComponent(input)));
                document.getElementById('output').value = encoded;
                showMessage('Encoded successfully', 'success');
            } catch (e) {
                showMessage('Encoding error: ' + e.message, 'error');
            }
        }

        function decodeBase64() {
            const input = document.getElementById('input').value;

            if (!input) {
                showMessage('Please enter Base64 string to decode', 'error');
                return;
            }

            try {
                const decoded = decodeURIComponent(escape(atob(input)));
                document.getElementById('output').value = decoded;
                showMessage('Decoded successfully', 'success');
            } catch (e) {
                showMessage('Decoding error: Invalid Base64', 'error');
            }
        }

        function copyOutput() {
            const output = document.getElementById('output').value;

            if (!output) {
                showMessage('Nothing to copy', 'error');
                return;
            }

            navigator.clipboard.writeText(output).then(() => {
                showMessage('Copied to clipboard', 'success');
            });
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            document.getElementById('message').style.display = 'none';
        }

        function swapInputOutput() {
            const input = document.getElementById('input').value;
            const output = document.getElementById('output').value;
            document.getElementById('input').value = output;
            document.getElementById('output').value = input;
        }
    </script>
</body>

</html>
