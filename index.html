<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Player</title>
  <style>
    :root {
      --bg: #0b1020;
      --bg-soft: rgba(255, 255, 255, 0.06);
      --card: rgba(15, 23, 42, 0.75);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #ecf2ff;
      --muted: #9fb0d0;
      --accent: #6ea8fe;
      --accent-2: #8b5cf6;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(110,168,254,.22), transparent 28%),
        radial-gradient(circle at top right, rgba(139,92,246,.18), transparent 25%),
        linear-gradient(180deg, #09101d 0%, #0b1020 45%, #050814 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app { width: min(1000px,100%); }

    .card {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 20px;
    }

    .controls {
      display:flex;
      gap:10px;
      margin-bottom:12px;
    }

    input {
      flex:1;
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.05);
      color:white;
    }

    button {
      padding:12px 16px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    .frame-wrap {
      position:relative;
      width:100%;
      aspect-ratio:16/9;
      background:black;
      border-radius:16px;
      overflow:hidden;
    }

    iframe {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
    }

  </style>
</head>
<body>

<div class="app">
  <div class="card">

    <div class="controls">
      <input id="imdbInput" placeholder="tt26443616 OR 26443616" value="tt26443616" />
      <button onclick="loadMovie()">Load</button>
    </div>

    <div class="frame-wrap">
      <iframe id="frame" src="https://vidsrcme.ru/embed/movie?imdb=tt26443616"></iframe>
    </div>

  </div>
</div>

<script>
function loadMovie(){
  let val = document.getElementById('imdbInput').value.trim();

  // if user only put number → auto add tt
  if(!val.startsWith('tt')){
    val = 'tt' + val;
  }

  // basic clean (remove spaces etc)
  val = val.replace(/[^a-z0-9]/gi,'');

  document.getElementById('frame').src =
    'https://vidsrcme.ru/embed/movie?imdb=' + val;
}
</script>

</body>
</html>
