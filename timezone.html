<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Timezone Clock</title>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'km,en,zh-CN',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript"
        src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
        :root {
            --bg: #0b1020;
            --bg-soft: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #ecf2ff;
            --muted: #9fb0d0;
            --accent: #6ea8fe;
            --accent-2: #8b5cf6;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110, 168, 254, .22), transparent 28%),
                radial-gradient(circle at top right, rgba(139, 92, 246, .18), transparent 25%),
                linear-gradient(180deg, #09101d 0%, #0b1020 45%, #050814 100%);
            color: var(--text);
        }

        body {
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }

        .glow {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 999px;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .glow.one {
            top: 0;
            left: -80px;
            background: #3b82f6;
        }

        .glow.two {
            right: -80px;
            bottom: 0;
            background: #7c3aed;
        }

        .app {
            position: relative;
            z-index: 1;
            width: min(1000px, 100%);
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .03));
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 24px;
            margin-bottom: 20px;
        }

        .back-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .text-button {
            min-height: 44px;
            padding: 0 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            margin: 0 0 8px;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-select {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-select:focus {
            border-color: var(--accent);
        }

        .clock-card {
            display: grid;
            gap: 16px;
            margin-top: 24px;
        }

        .clock-display {
            background: rgba(0, 0, 0, .2);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .time-value {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            margin: 0;
        }

        .time-label {
            color: var(--muted);
            margin-top: 8px;
        }

        .clock-footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {

            .form-grid,
            .clock-footer {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="glow one"></div>
    <div class="glow two"></div>

    <main class="app">
        <section class="card">
            <div class="back-row">
                <a href="index.html" class="text-button">← Back to Services</a>
                <div id="google_translate_element"></div>
            </div>

            <div class="brand">
                <h1>🌐 Timezone Clock</h1>
                <p>See the current time in your location and compare it with world time zones.</p>
                <p style="font-size: 0.9rem; margin-top: 8px; opacity: 0.8;">Automatically detects your current location
                    and displays the time.</p>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="dateFormat">Date Format</label>
                    <select id="dateFormat" class="form-select">
                        <option value="long">Long</option>
                        <option value="short">Short</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="timezoneSelect">Compare with Timezone</label>
                    <select id="timezoneSelect" class="form-select"></select>
                </div>
            </div>

            <div class="clock-card">
                <div class="clock-display">
                    <p class="time-value" id="localClock">--:--:--</p>
                    <p class="time-label" id="localLabel">Your Local Time</p>
                </div>
                <div class="clock-display">
                    <p class="time-value" id="zoneClock">--:--:--</p>
                    <p class="time-label" id="zoneLabel">UTC</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const timezones = [
                'UTC',
                'America/New_York',
                'America/Los_Angeles',
                'Europe/London',
                'Europe/Paris',
                'Asia/Tokyo',
                'Asia/Shanghai',
                'Asia/Kolkata',
                'Australia/Sydney',
                'Pacific/Auckland'
            ];
            const timezoneSelect = document.getElementById('timezoneSelect');
            const dateFormat = document.getElementById('dateFormat');
            const localClock = document.getElementById('localClock');
            const zoneClock = document.getElementById('zoneClock');
            const zoneLabel = document.getElementById('zoneLabel');

            timezones.forEach(zone => {
                const option = document.createElement('option');
                option.value = zone;
                option.textContent = zone.replace('_', ' ');
                timezoneSelect.appendChild(option);
            });

            // Set default comparison timezone to UTC
            timezoneSelect.value = 'UTC';

            function formatTime(date, zone) {
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: zone,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false,
                    weekday: 'short',
                    month: dateFormat.value,
                    day: '2-digit',
                    year: 'numeric'
                });
                return formatter.format(date);
            }

            function updateClock() {
                const now = new Date();
                const currentTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
                localClock.textContent = formatTime(now, currentTimezone);
                localLabel.textContent = `Your Local Time (${currentTimezone.replace('_', ' ')})`;
                const selectedZone = timezoneSelect.value;
                zoneClock.textContent = formatTime(now, selectedZone);
                zoneLabel.textContent = selectedZone.replace('_', ' ');
            }

            timezoneSelect.addEventListener('change', updateClock);
            dateFormat.addEventListener('change', updateClock);
            updateClock();
            setInterval(updateClock, 1000);
        });
    </script>
</body>

</html>
