<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>UUID Generator</title>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'km,en,zh-CN',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript"
        src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
        :root {
            --bg: #0b1020;
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #ecf2ff;
            --muted: #9fb0d0;
            --accent: #6ea8fe;
            --accent-2: #8b5cf6;
            --success: #34d399;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110, 168, 254, .22), transparent 28%),
                radial-gradient(circle at top right, rgba(139, 92, 246, .18), transparent 25%),
                linear-gradient(180deg, #09101d 0%, #0b1020 45%, #050814 100%);
            color: var(--text);
        }

        body {
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }

        .glow {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 999px;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .glow.one {
            top: 0;
            left: -80px;
            background: #3b82f6;
        }

        .glow.two {
            right: -80px;
            bottom: 0;
            background: #7c3aed;
        }

        .app {
            position: relative;
            z-index: 1;
            width: min(1000px, 100%);
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .03));
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            padding: 24px;
            margin-bottom: 20px;
        }

        .back-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .text-button {
            padding: 0 14px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            margin: 0 0 8px;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-input {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .button-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(110, 168, 254, .3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .12);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, .1);
        }

        .uuid-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .uuid-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 255, 255, .03);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 10px;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .uuid-item code {
            flex: 1;
            word-break: break-all;
        }

        .uuid-copy-btn {
            background: rgba(110, 168, 254, .2);
            border: none;
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .uuid-copy-btn:hover {
            background: rgba(110, 168, 254, .4);
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
        }

        .message.success {
            background: rgba(52, 211, 153, .1);
            border: 1px solid rgba(52, 211, 153, .3);
            color: var(--success);
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="glow one"></div>
    <div class="glow two"></div>

    <main class="app">
        <section class="card">
            <div class="back-row">
                <a href="index.html" class="text-button">← Back to Services</a>
                <div id="google_translate_element"></div>
            </div>

            <div class="brand">
                <h1>🆔 UUID Generator</h1>
                <p>Generate UUID v4 identifiers instantly</p>
            </div>

            <div id="message" class="message"></div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Number of UUIDs</label>
                    <input type="number" id="count" class="form-input" value="1" min="1" max="100">
                </div>
                <div class="form-group">
                    <label class="form-label">Format</label>
                    <select id="format" class="form-input" style="cursor: pointer;">
                        <option value="default">Standard (with hyphens)</option>
                        <option value="no-hyphen">Without hyphens</option>
                        <option value="uppercase">Uppercase</option>
                        <option value="braces">With braces</option>
                    </select>
                </div>
            </div>

            <div class="button-row">
                <button class="btn btn-primary" onclick="generateUUIDs()">Generate UUIDs</button>
                <button class="btn btn-secondary" onclick="copyAllUUIDs()">Copy All</button>
                <button class="btn btn-secondary" onclick="downloadUUIDs()">Download as Text</button>
                <button class="btn btn-secondary" onclick="clearList()">Clear</button>
            </div>

            <div id="resultsContainer" style="display: none;">
                <h3 style="margin: 0 0 16px; color: var(--text);">Generated UUIDs</h3>
                <div id="uuidList" class="uuid-list"></div>
            </div>
        </section>
    </main>

    <script>
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function formatUUID(uuid) {
            const format = document.getElementById('format').value;
            let formatted = uuid;

            switch (format) {
                case 'no-hyphen':
                    formatted = uuid.replace(/-/g, '');
                    break;
                case 'uppercase':
                    formatted = uuid.toUpperCase();
                    break;
                case 'braces':
                    formatted = '{' + uuid + '}';
                    break;
            }

            return formatted;
        }

        function generateUUIDs() {
            const count = Math.min(parseInt(document.getElementById('count').value) || 1, 100);
            const uuidList = [];

            for (let i = 0; i < count; i++) {
                const uuid = generateUUID();
                uuidList.push(formatUUID(uuid));
            }

            displayUUIDs(uuidList);
            showMessage(count + ' UUID(s) generated', 'success');
        }

        function displayUUIDs(uuids) {
            const container = document.getElementById('uuidList');
            container.innerHTML = '';

            uuids.forEach((uuid, index) => {
                const item = document.createElement('div');
                item.className = 'uuid-item';
                item.innerHTML = `
                    <code>${uuid}</code>
                    <button class="uuid-copy-btn" onclick="copyUUID('${uuid}')">Copy</button>
                `;
                container.appendChild(item);
            });

            document.getElementById('resultsContainer').style.display = 'block';
            document.getElementById('resultsContainer').scrollIntoView({ behavior: 'smooth' });
        }

        function copyUUID(uuid) {
            navigator.clipboard.writeText(uuid).then(() => {
                showMessage('Copied: ' + uuid, 'success');
            });
        }

        function copyAllUUIDs() {
            const items = document.querySelectorAll('.uuid-item code');
            const uuids = Array.from(items).map(item => item.textContent).join('\n');

            if (uuids) {
                navigator.clipboard.writeText(uuids).then(() => {
                    showMessage('All UUIDs copied to clipboard', 'success');
                });
            }
        }

        function downloadUUIDs() {
            const items = document.querySelectorAll('.uuid-item code');
            const uuids = Array.from(items).map(item => item.textContent).join('\n');

            if (uuids) {
                const element = document.createElement('a');
                element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(uuids));
                element.setAttribute('download', 'uuids.txt');
                element.style.display = 'none';
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
                showMessage('Downloaded uuids.txt', 'success');
            }
        }

        function clearList() {
            document.getElementById('uuidList').innerHTML = '';
            document.getElementById('resultsContainer').style.display = 'none';
            document.getElementById('message').style.display = 'none';
        }

        function showMessage(msg, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = msg;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 3000);
        }
    </script>
</body>

</html>
